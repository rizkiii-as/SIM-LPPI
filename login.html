<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SIM LPPI UMP</title>

    <!-- #Bootstrap 5.3.7 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />

    <link rel="stylesheet" href="assets/css/login.css" />

    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>
    <main class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="box-area border rounded-4 row bg-white shadow">
        <!-- Logo & Welcome Text -->
        <section class="left-box-login col-md-6 rounded-4 d-flex flex-column justify-content-center align-items-center p-3">
          <div class="featured-image mb-3">
            <img src="/assets/img/LogoUMPnonbg.png" alt="Logo UMP" class="img-fluid" />
          </div>
          <h1 class="text-center text-white fs-1 fw-bold">Hello Student</h1>
          <p class="text-center text-white fs-6 fw-normal">Enter your personal details and start your journey with SIM LPPI UMP</p>
        </section>
        <!-- Form Login -->
        <section class="right-box-login col-md-6 d-flex flex-column justify-content-center align-items-center p-4">
          <div class="row align-items-center">
            <div class="header-text mb-4">
              <h3 class="text-center fs-3 fw-bold">Login SIM LPPI UMP</h3>
            </div>
            <form id="loginForm" class="needs-validation" novalidate>
              <div id="alertContainer" class="d-none text-center">
                <div class="alert alert-danger" role="alert">NIM atau password salah!</div>
              </div>
              <div class="mb-2">
                <label for="nim" class="form-label m-0">NIM</label>
                <input type="text" placeholder="Nomor Induk Mahasiswa" class="form-control" id="nim" required />
                <div class="invalid-feedback">NIM wajib diisi</div>
              </div>
              <div class="mb-4">
                <label for="password" class="form-label m-0">Password</label>
                <input type="password" placeholder="Password" class="form-control" id="password" required />
                <div class="invalid-feedback">Password wajib diisi</div>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <!-- Bootstrap Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
